services:
  - type: web
    name: repair-tracker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: repair-db
          property: connectionString

  - type: cron
    name: repair-reminders
    runtime: python
    schedule: "0 16 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.reminders
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: repair-db
          property: connectionString
      - key: REMINDER_AFTER_DAYS
        value: "3"
      - key: REMINDER_INTERVAL_DAYS
        value: "3"

databases:
  - name: repair-db
    plan: basic-256mb
